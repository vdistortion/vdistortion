<a
  class="card"
  [routerLink]="['/project', project().id]"
  [appTrackClick]="'project_card_' + project().id + '_click'"
>
  <div class="card__header">
    <span class="card__title">{{ project().title }}</span>
  </div>

  <p class="card__desc">{{ project().shortDescription }}</p>

  <ul class="card__tags">
    @for (t of project().tech; track t) {
      <li class="tag">{{ t }}</li>
    }
  </ul>
</a>
