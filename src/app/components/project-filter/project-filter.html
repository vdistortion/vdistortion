<div class="filter">
  <button
    type="button"
    class="filter__btn"
    [class.active]="angularOnly()"
    (click)="filterChange.emit(true)"
    appTrackClick="filter_tag_angular_click"
  >
    <app-ui-icon icon="logos:angular"></app-ui-icon>
  </button>

  <button
    type="button"
    class="filter__btn"
    [class.active]="!angularOnly()"
    (click)="filterChange.emit(false)"
    appTrackClick="filter_tag_all_click"
  >
    Все проекты
  </button>
</div>
