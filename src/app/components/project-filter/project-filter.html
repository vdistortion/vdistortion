<div class="filter">
  @for (tag of tags(); track tag) {
    <button
      type="button"
      class="filter__btn"
      [class.active]="activeTag() === tag"
      (click)="onFilter(tag)"
      [appTrackClick]="'filter_tag_' + tag + '_click'"
    >
      @if (tag === 'angular') {
        <app-ui-icon icon="logos:angular"></app-ui-icon>
      }
      @if (tag === 'all') {
        Все проекты
      }
    </button>
  }
</div>
