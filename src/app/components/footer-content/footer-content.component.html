<app-ui-card>
  <div class="footer-content">
    <ul class="footer-content__contacts">
      @for (item of list; track item.link) {
        <li>
          <a [href]="item.link" target="_blank" [appTrackClick]="`contacts_${item.name}_click`">
            {{ item.name }}
          </a>
        </li>
      }
    </ul>
    <img src="angular_gradient.png" alt="Angular" />
  </div>
</app-ui-card>
